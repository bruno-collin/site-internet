<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Artiste - Bruno Collin</title>
    <style>
        /* Reset et styles de base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #111;
            color: #fff;
            line-height: 1.6;
        }

        /* En-tête */
        header {
            padding: 30px;
            text-align: center;
            background-color: #000;
            border-bottom: 1px solid #333;
        }

        header h1 {
            margin: 0;
            font-size: 36px;
            letter-spacing: 2px;
        }

        /* Section principale */
        section {
            padding: 60px 10%;
            text-align: center;
        }

        section h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        section p {
            margin-bottom: 40px;
            color: #ccc;
        }

        /* Grille des galeries */
        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        /* Style des vignettes */
        .home-item {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .home-item:hover {
            transform: translateY(-5px);
        }

        .home-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .home-title {
            font-size: 18px;
            color: #fff;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            display: inline-block;
        }

        /* Pied de page */
        footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #333;
            margin-top: 60px;
            font-size: 14px;
            opacity: 0.7;
        }

        .footer-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .button {
            background: #333;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.3s;
        }

        .button:hover {
            background: #555;
        }

        /* Styles pour les modales - initialement cachées */
        #galleryModal, #fullImageModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
        }

        #galleryTitle {
            text-align: center;
            color: white;
            padding: 20px;
            font-size: 24px;
            background-color: rgba(0, 0, 0, 0.7);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            z-index: 1001;
        }

        /* Galerie organisée par séries */
        .modal-gallery {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 20px;
        }

        .series-container {
            margin-bottom: 40px;
        }

        .series-title {
            text-align: left;
            font-size: 20px;
            margin-bottom: 15px;
            padding-left: 20px;
        }

        .series-images {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 0 20px 10px;
        }

        .series-images img {
            max-width: 300px;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Modale pour l'image agrandie */
        .modal-image-full {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .full-image-container {
            display: flex;
            max-width: 90%;
            gap: 30px;
            align-items: center;
        }

        .full-image-legend {
            max-width: 300px;
            color: white;
            font-size: 16px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            text-align: left;
        }

        .modal-image-full img {
            max-width: 70%;
            max-height: 90vh;
            border-radius: 8px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <!-- Contenu principal visible dès le chargement -->
    <header>
        <h1>Bruno Collin Plasticien</h1>
    </header>

    <section>
        <h2>Mes Galeries</h2>
        <p>Cliquez sur une image pour explorer les œuvres</p>

        <div class="home-grid">
            <!-- Galerie Toile -->
            <div class="home-item" onclick="openGallery('toile')">
                <img src="images-toile/toile-serie001-001.jpg" alt="Peintures sur toile">
                <div class="home-title">Peintures sur Toile</div>
            </div>

            <!-- Galerie Papier -->
            <div class="home-item" onclick="openGallery('papier')">
                <img src="images-papier/papier-serie003-003.jpg" alt="Œuvres sur papier">
                <div class="home-title">Œuvres sur Papier</div>
            </div>

            <!-- Galerie 3D -->
            <div class="home-item" onclick="openGallery('3d')">
                <img src="images-3d/3d-serie006-001.jpg" alt="Volumes">
                <div class="home-title">Volumes</div>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-buttons">
            <a href="demarche.html" class="button">Démarche</a>
            <a href="contact.html" class="button">Contact</a>
        </div>
        <p>© 2026 Portfolio Artiste</p>
    </footer>

    <!-- Modales initialement cachées -->
    <div id="galleryModal" style="display: none;">
        <h2 id="galleryTitle"></h2>
        <span class="modal-close" onclick="closeGallery()">&times;</span>
        <div class="modal-gallery" id="modalGalleryContent"></div>
    </div>

    <div id="fullImageModal" style="display: none;">
        <span class="modal-close" onclick="closeFullImage()">&times;</span>
        <div class="full-image-container">
            <div class="full-image-legend" id="fullImageLegend"></div>
            <img id="fullImageContent" onclick="event.stopPropagation()">
        </div>
    </div>

                            { src: "images-toile/toile-serie001-002.jpg", legend: "Fortuité 2\nAcrylique et autres techniques sur toile\n90cm x 130cm\n2025" }
                        ]
                    },
