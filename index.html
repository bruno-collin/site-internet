<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Artiste - Bruno Collin</title>
    <style>
        /* Styles existants (conservés) */
        body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #111; color: #fff; }
        header { padding: 30px; text-align: center; background: #000; border-bottom: 1px solid #333; }
        header h1 { margin: 0; font-size: 36px; letter-spacing: 2px; }
        section { padding: 60px 10%; }
        .home-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-top: 40px; }
        .home-item { position: relative; cursor: pointer; text-decoration: none; color: white; }
        .home-item img { width: 100%; height: 420px; object-fit: cover; border-radius: 12px; transition: transform 0.4s; }
        .home-item:hover img { transform: scale(1.05); }
        .home-title { position: absolute; bottom: 20px; width: 100%; text-align: center; background: rgba(0, 0, 0, 0.7); color: white; padding: 10px 0; border-radius: 6px; font-size: 18px; }
        .button { background: #333; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 6px; display: inline-block; margin: 5px; }
        .footer-buttons { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        footer { text-align: center; padding: 30px; border-top: 1px solid #333; margin-top: 60px; font-size: 14px; opacity: 0.7; }

        /* Styles pour la modale de galerie (avec défilement) */    
    #galleryModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        overflow-y: auto; /* Active le défilement vertical si nécessaire */
        padding: 20px 0;
    }

    .modal-close {
        position: fixed;
        top: 20px;
        right: 30px;
        color: white;
        font-size: 30px;
        cursor: pointer;
        z-index: 1001;
    }

    .modal-gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        max-width: 1200px;
        margin: 60px auto 40px;
        padding: 0 20px;
    }

    .modal-gallery img {
        width: 100%;
        height: 280px;
        object-fit: cover;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.3s;
    }

    .modal-gallery img:hover {
        transform: scale(1.03);
    }


        
        .modal-image-full {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1001;
            justify-content: center;
            align-items: center;
        }
        .modal-image-full img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Bruno Collin Plasticien</h1>
    </header>

    <section>
        <h2>Galeries</h2>
        <p>Cliquez sur une image pour ouvrir la galerie correspondante.</p>
        <div class="home-grid">
            <div class="home-item" onclick="openGallery('toile')">
                <img src="images-toile/toile-001.jpg">
                <div class="home-title">Œuvres Support Toile</div>
            </div>
            <div class="home-item" onclick="openGallery('papier')">
                <img src="images-papier/papier-005.jpg">
                <div class="home-title">Œuvres Support Papier</div>
            </div>
            <div class="home-item" onclick="openGallery('3d')">
                <img src="images-3d/3d-001.jpg">
                <div class="home-title">Œuvres 3D</div>
            </div>
        </div>
    </section>

    <!-- Modale pour les galeries -->
    <div id="galleryModal">
        <span class="modal-close" onclick="closeGallery()">&times;</span>
        <div class="modal-gallery" id="modalGalleryContent"></div>
    </div>

    <!-- Modale pour l'image agrandie -->
    <div id="fullImageModal" class="modal-image-full" onclick="closeFullImage()">
        <img id="fullImageContent">
    </div>

    <footer>
        <div class="footer-buttons">
            <a href="demarche.html" class="button">Démarche</a>
            <a href="contact.html" class="button">Contact</a>
        </div>
        © 2026 Portfolio Artiste
    </footer>

    <script>
        // Liste des images pour chaque galerie
        const galleries = {
            toile: [
                "images-toile/toile-001.jpg",
                "images-toile/toile-002.jpg",
                "images-toile/toile-003.jpg",
                "images-toile/toile-004.jpg",
                "images-toile/toile-005.jpg",
                "images-toile/toile-006.jpg",
                "images-toile/toile-007.jpg"
            ],
            papier: [
                "images-papier/papier-001.jpg",
                "images-papier/papier-002.jpg",
                "images-papier/papier-003.jpg",
                "images-papier/papier-004.jpg",
                "images-papier/papier-005.jpg"
            ],
            "3d": [
                "images-3d/3d-001.jpg",
                "images-3d/3d-002.jpg",
                "images-3d/3d-003.jpg",
                "images-3d/3d-004.jpg"
            ]
        };

        // Ouvre une galerie dans la modale
        function openGallery(type) {
            const modal = document.getElementById("galleryModal");
            const galleryContent = document.getElementById("modalGalleryContent");
            galleryContent.innerHTML = "";

            galleries[type].forEach(image => {
                galleryContent.innerHTML += `
                    <img src="${image}" onclick="openFullImage('${image}')">
                `;
            });

            modal.style.display = "block";
        }

        // Ferme la modale de galerie
        function closeGallery() {
            document.getElementById("galleryModal").style.display = "none";
        }

        // Ouvre une image en grand
        function openFullImage(src) {
            const modal = document.getElementById("fullImageModal");
            const img = document.getElementById("fullImageContent");
            img.src = src;
            modal.style.display = "flex";
        }

        // Ferme l'image agrandie
        function closeFullImage() {
            document.getElementById("fullImageModal").style.display = "none";
        }
    </script>
</body>
</html>
