<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Artiste - Bruno Collin</title>
    <style>
        /* Styles globaux */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #111;
            color: #fff;
        }

        header {
            padding: 30px;
            text-align: center;
            background: #000;
            border-bottom: 1px solid #333;
        }

        header h1 {
            margin: 0;
            font-size: 36px;
            letter-spacing: 2px;
        }

        section {
            padding: 60px 10%;
        }

        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .home-item {
            cursor: pointer;
            text-decoration: none;
            color: white;
            text-align: center;
        }

        .home-item img {
            width: 100%;
            height: 420px;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.4s;
            margin-bottom: 10px;
        }

        .home-item:hover img {
            transform: scale(1.05);
        }

        .home-title {
            width: 100%;
            text-align: center;
            color: white;
            padding: 10px 0;
            font-size: 18px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .home-title:hover {
            color: #ccc;
        }

        .button {
            background: #333;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            display: inline-block;
            margin: 5px;
        }

        .footer-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #333;
            margin-top: 60px;
            font-size: 14px;
            opacity: 0.7;
        }

        /* Styles pour les modales */
        #galleryModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px 0;
        }

        #galleryTitle {
            text-align: center;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 0;
            z-index: 1000;
            font-size: 24px;
            margin-top: 0;
        }

        .modal-close {
            position: fixed;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            z-index: 1001;
        }

        /* Galerie organisée par séries */
        .modal-gallery {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 0 20px;
        }

        .series-container {
            margin-bottom: 40px;
        }

        .series-title {
            text-align: left;
            font-size: 20px;
            color: white;
            font-weight: bold;
            margin-bottom: 15px;
            padding-left: 20px;
        }

        .series-images {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding-bottom: 10px;
            padding-left: 20px;
        }

        .series-images::-webkit-scrollbar {
            height: 8px;
        }

        .series-images::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .series-images img {
            max-width: 300px;
            max-height: 300px;
            transform: scale(1);
            object-fit: contain;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s;
            flex-shrink: 0;
        }

        .series-images img:hover {
            transform: scale(1.05);
        }

        /* Modale pour l'image agrandie avec légende à gauche */
        .modal-image-full {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .full-image-container {
            display: flex;
            max-width: 90%;
            max-height: 90%;
            align-items: center;
            gap: 30px;
        }

        .full-image-legend {
            max-width: 300px;
            color: white;
            font-size: 16px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            text-align: left;
        }

        .modal-image-full img {
            max-width: 70%;
            max-height: 90vh;
            border-radius: 8px;
            object-fit: contain;
        }

        .modal-close-full {
            position: fixed;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            z-index: 1002;
        }
    </style>
</head>

            <!-- Galerie 3D -->
            <div class="home-item" onclick="openGallery('3d')">

    </section>

    <!-- Modale pour les galeries -->
    <div id="galleryModal">

        <span class="modal-close" onclick="closeGallery()">&times;</span>
        <div class="modal-gallery" id="modalGalleryContent"></div>
    </div>

    <div id="fullImageModal" class="modal-image-full">
        <span class="modal-close-full" onclick="closeFullImage()">&times;</span>
        <div class="full-image-container">
            <div class="full-image-legend" id="fullImageLegend"></div>
            <img id="fullImageContent">
        </div>
    </div>

    <footer>
        <div class="footer-buttons">

    </footer>

        // Ouvre une galerie dans la modale
        function openGallery(type) {
            const modal = document.getElementById("galleryModal");
            const galleryContent = document.getElementById("modalGalleryContent");
            const galleryTitle = document.getElementById("galleryTitle");

            // Définit le titre en fonction du type de galerie
            let title = "";
            if (type === "toile") title = "Œuvres Support Toile";
            else if (type === "papier") title = "Œuvres Support Papier";
            else if (type === "3d") title = "Œuvres 3D";
            galleryTitle.textContent = title;

            // Vide le contenu précédent
            galleryContent.innerHTML = "";

            // Affiche les séries de la galerie
            galleries[type].forEach(series => {
                const seriesDiv = document.createElement("div");
                seriesDiv.className = "series-container";

                const seriesTitle = document.createElement("div");
                seriesTitle.className = "series-title";
                seriesTitle.textContent = series.series;
                seriesDiv.appendChild(seriesTitle);

                const seriesImagesDiv = document.createElement("div");
                seriesImagesDiv.className = "series-images";

                series.images.forEach(image => {
                    const img = document.createElement("img");
                    img.src = image.src;
                    img.onclick = () => openFullImage(image.src, image.legend);
                    seriesImagesDiv.appendChild(img);
                });

                seriesDiv.appendChild(seriesImagesDiv);
                galleryContent.appendChild(seriesDiv);
            });

            modal.style.display = "block";
            modal.scrollTop = 0;
        }

        // Ferme la modale de galerie
        function closeGallery() {
            document.getElementById("galleryModal").style.display = "none";
        }

        // Ouvre une image en grand (avec légende à gauche)
        // et transforme le saut de ligne \n en <br>
        function openFullImage(src, legend) {
            const modal = document.getElementById("fullImageModal");
            const img = document.getElementById("fullImageContent");
        const legendElement = document.getElementById("fullImageLegend");

        img.src = src;
        // Remplace les sauts de ligne par des balises <br>
        legendElement.innerHTML = legend.replace(/\n/g, '<br>');
        modal.style.display = "flex";
        }
        
        // Ferme l'image agrandie
        function closeFullImage() {
            document.getElementById("fullImageModal").style.display = "none";
        }
