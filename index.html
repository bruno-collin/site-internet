<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Portfolio Artiste - Bruno Collin</title>
    <style>
        /* Styles globaux */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        header {
            padding: 30px;
            text-align: center;
            background: #000;
            border-bottom: 1px solid #333;
        }

        header h1 {
            margin: 0;
            font-size: 36px;
            letter-spacing: 2px;
        }

        section {
            padding: 60px 10%;
        }

        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .home-item {
            cursor: pointer;
            text-decoration: none;
            color: white;
            text-align: center;
        }

        .home-item img {
            width: 100%;
            height: 420px;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.4s;
            margin-bottom: 10px;
        }

        .home-item:hover img {
            transform: scale(1.05);
        }

        .home-title {
            width: 100%;
            text-align: center;
            color: white;
            padding: 10px 0;
            font-size: 18px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .home-title:hover {
            color: #ccc;
        }

        .button {
            background: #333;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            display: inline-block;
            margin: 5px;
        }

        .footer-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #333;
            margin-top: 60px;
            font-size: 14px;
            opacity: 0.7;
        }

        /* Overlay pour masquer la page d'accueil */
        .page-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999;
        }

        /* Styles pour les modales */
        .modal {
            display: none !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: rgba(0, 0, 0, 0.9) !important;
            z-index: -1 !important;
            overflow: hidden !important;
        }

        #galleryModal {
            overflow-y: auto !important;
        }

        #galleryTitle {
            text-align: center;
            color: white;
            padding: 20px;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.7);
            position: sticky;
            top: 0;
        }

        .modal-close {
            position: fixed;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            z-index: 1001;
        }

        /* Galerie organisée par séries */
        .modal-gallery {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .series-container {
            margin-bottom: 40px;
        }

        .series-title {
            text-align: left;
            font-size: 20px;
            color: white;
            font-weight: bold;
            margin-bottom: 15px;
            padding-left: 20px;
        }

        .series-images {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding-bottom: 10px;
        }

        .series-images::-webkit-scrollbar {
            height: 8px;
        }

        .series-images::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .series-images img {
            max-width: 300px;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s;
            flex-shrink: 0;
        }

        .series-images img:hover {
            transform: scale(1.05);
        }

        /* Modale pour l'image agrandie avec légende à gauche */
        #fullImageModal {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .full-image-container {
            display: flex;
            max-width: 90%;
            max-height: 90%;
            align-items: center;
            gap: 30px;
        }

        .full-image-legend {
            max-width: 300px;
            color: white;
            font-size: 16px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            text-align: left;
        }

        #fullImageContent {
            max-width: 70%;
            max-height: 90vh;
            border-radius: 8px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <header>
        <h1>Bruno Collin Plasticien</h1>
    </header>

    <section id="homeSection">
        <h2>Galeries</h2>
        <p>Cliquez sur une image ou sur son titre pour ouvrir la galerie correspondante.</p>
        <div class="home-grid">
            <!-- Galerie Toile -->
            <div class="home-item" onclick="openGallery('toile')">
                <img src="images-toile/toile-001.jpg">
                <div class="home-title">Œuvres Support Toile</div>
            </div>

            <!-- Galerie Papier -->
            <div class="home-item" onclick="openGallery('papier')">
                <img src="images-papier/papier-serie001-000.jpg">
                <div class="home-title">Œuvres Support Papier</div>
            </div>

            <!-- Galerie 3D -->
            <div class="home-item" onclick="openGallery('3d')">
                <img src="images-3d/3d-001.jpg">
                <div class="home-title">Œuvres 3D</div>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-buttons">
            <a href="demarche.html" class="button">Démarche</a>
            <a href="contact.html" class="button">Contact</a>
        </div>
        © 2026 Portfolio Artiste
    </footer>

    <!-- Overlay pour masquer la page d'accueil -->
    <div class="page-overlay" id="pageOverlay"></div>

    <!-- Modale pour les galeries -->
    <div id="galleryModal" class="modal">
        <h2 id="galleryTitle"></h2>
        <span class="modal-close" onclick="closeGallery()">&times;</span>
        <div class="modal-gallery" id="modalGalleryContent"></div>
    </div>

    <!-- Modale pour l'image agrandie -->
    <div id="fullImageModal" class="modal">
        <span class="modal-close" onclick="closeFullImage()">&times;</span>
        <div class="full-image-container">
            <div class="full-image-legend" id="fullImageLegend"></div>
            <img id="fullImageContent">
        </div>
    </div>

    <script>
        // Liste des images pour chaque galerie (organisées par séries)
        const galleries = {
            toile: [
                {
                    series: "Fortuité",
                    images: [
                        { src: "images-toile/toile-001.jpg", legend: "Fortuité 1 / Acrylique et autres techniques sur toile / 90cm x 130cm / 2026" },
                        { src: "images-toile/toile-002.jpg", legend: "Fortuité 2 - Acrylique et pastel, 100x80 cm" },
                        { src: "images-toile/toile-003.jpg", legend: "Fortuité 3 - Inspiration CoBrA, toile libre" },
                        { src: "images-toile/toile-004.jpg", legend: "Fortuité 4 - Peinture à l'huile, 2022" }
                    ]
                },
                {
                    series: "Abstraction",
                    images: [
                        { src: "images-toile/toile-005.jpg", legend: "Abstraction 1 - Abstraction géométrique" },
                        { src: "images-toile/toile-006.jpg", legend: "Abstraction 2 - Collage et peinture" },
                        { src: "images-toile/toile-007.jpg", legend: "Abstraction 3 - Série 'Horizons'" }
                    ]
                }
            ],
            papier: [
                {
                    series: "Série 'Monotypes'",
                    images: [
                        { src: "images-papier/papier-serie002-001.jpg", legend: "Monotype 1 - Acrylique sur papier, 50cm x 65cm" },
                        { src: "images-papier/papier-serie002-001.jpg", legend: "Monotype 2 - Acrylique sur papier, 50cm x 65cm" }
                    ]
                },
                {
                    series: "Série 'Envahissement'",
                    images: [
                        { src: "images-papier/papier-serie003-003.jpg", legend: "Envahissement 03 - Acrylique, découpage et collage sur papier, 50cm x 65cm" },
                        { src: "images-papier/papier-serie003-004.jpg", legend: "Envahissement 04 - Acrylique, découpage et collage sur papier, 50cm x 65cm" },
                        { src: "images-papier/papier-serie003-005.jpg", legend: "Envahissement 05 - Acrylique, découpage et collage sur papier, 50cm x 65cm" }
                    ]
                },
                {
                    series: "Série 'Bientôt Fini'",
                    images: [
                        { src: "images-papier/papier-serie001-000.jpg", legend: "Série 'Bientôt Fini' - Dessin 1" },
                        { src: "images-papier/papier-serie001-001.jpg", legend: "Dessin 1 - Fusain et pastel" },
                        { src: "images-papier/papier-serie001-002.jpg", legend: "Dessin 2 - Fusain et pastel" },
                        { src: "images-papier/papier-serie001-003.jpg", legend: "Dessin 3 - Fusain et pastel" },
                        { src: "images-papier/papier-serie001-004.jpg", legend: "Dessin 4 - Fusain et pastel" },
                        { src: "images-papier/papier-serie001-005.jpg", legend: "Dessin 5 - Fusain et pastel" },
                        { src: "images-papier/papier-serie001-006.jpg", legend: "Dessin 6 - Fusain et pastel" },
                        { src: "images-papier/papier-serie001-007.jpg", legend: "Dessin 7 - Fusain et pastel" },
                        { src: "images-papier/papier-serie001-008.jpg", legend: "Dessin 8 - Fusain et pastel" },
                        { src: "images-papier/papier-serie001-009.jpg", legend: "Dessin 9 - Fusain et pastel" }
                    ]
                }
            ],
            "3d": [
                {
                    series: "Sculptures",
                    images: [
                        { src: "images-3d/3d-001.jpg", legend: "Sculpture 1 - Carton et peinture, 2024" },
                        { src: "images-3d/3d-002.jpg", legend: "Sculpture 2 - Installation, matériaux recyclés" }
                    ]
                },
                {
                    series: "Assemblages",
                    images: [
                        { src: "images-3d/3d-003.jpg", legend: "Assemblage 1 - Bois et métal" },
                        { src: "images-3d/3d-004.jpg", legend: "Assemblage 2 - Volume, papier mâché" }
                    ]
                }
            ]
        };

        // Ouvre une galerie dans la modale
        function openGallery(type) {
            // Affiche l'overlay pour masquer la page d'accueil
            document.getElementById('pageOverlay').style.display = 'block';
            document.getElementById('pageOverlay').style.zIndex = '999';
            document.body.style.overflow = 'hidden';
            document.body.style.position = 'fixed';

            const modal = document.getElementById("galleryModal");
            const galleryContent = document.getElementById("modalGalleryContent");
            const galleryTitle = document.getElementById("galleryTitle");

            // Définit le titre en fonction du type de galerie
            let title = "";
            if (type === "toile") title = "Œuvres Support Toile";
            else if (type === "papier") title = "Œuvres Support Papier";
            else if (type === "3d") title = "Œuvres 3D";
            galleryTitle.textContent = title;

            // Vide le contenu précédent
            galleryContent.innerHTML = "";

            // Affiche les séries de la galerie
            galleries[type].forEach(series => {
                const seriesDiv = document.createElement("div");
                seriesDiv.className = "series-container";

                const seriesTitle = document.createElement("div");
                seriesTitle.className = "series-title";
                seriesTitle.textContent = series.series;
                seriesDiv.appendChild(seriesTitle);

                const seriesImagesDiv = document.createElement("div");
                seriesImagesDiv.className = "series-images";

                series.images.forEach(image => {
                    const img = document.createElement("img");
                    img.src = image.src;
                    img.onclick = () => openFullImage(image.src, image.legend);
                    seriesImagesDiv.appendChild(img);
                });

                seriesDiv.appendChild(seriesImagesDiv);
                galleryContent.appendChild(seriesDiv);
            });

            modal.style.display = "block";
            modal.style.zIndex = "1000";
        }

        // Ferme la modale de galerie
        function closeGallery() {
            document.getElementById("galleryModal").style.display = "none";
            document.getElementById("galleryModal").style.zIndex = "-1";
            document.getElementById('pageOverlay').style.display = "none";
            document.getElementById('pageOverlay').style.zIndex = "-1";
            document.body.style.overflow = 'auto';
            document.body.style.position = 'static';
        }

        // Ouvre une image en grand (avec légende)
        function openFullImage(src, legend) {
            const modal = document.getElementById("fullImageModal");
            const img = document.getElementById("fullImageContent");
            const legendElement = document.getElementById("fullImageLegend");

            img.src = src;
            legendElement.textContent = legend;
            modal.style.display = "block";
            modal.style.zIndex = "1001";
            document.body.style.overflow = 'hidden';
        }

        // Ferme l'image agrandie
        function closeFullImage() {
            document.getElementById("fullImageModal").style.display = "none";
            document.getElementById("fullImageModal").style.zIndex = "-1";
            document.body.style.overflow = 'auto';
            document.body.style.position = 'static';
        }
    </script>
</body>
</html>
