<!DOCTYPE html>
<html lang="fr">

    <meta charset="UTF-8">

    <title>Portfolio Artiste - Bruno Collin</title>
    <style>
        /* Styles globaux */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #111;
            color: #fff;
            overflow-x: hidden;
        }

        header {
            padding: 30px;
            text-align: center;
            background: #000;
            border-bottom: 1px solid #333;
        }

        header h1 {
            margin: 0;
            font-size: 36px;
            letter-spacing: 2px;
        }

        section {
            padding: 60px 10%;
            min-height: calc(100vh - 200px);
        }

        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .home-item {
            cursor: pointer;
            text-decoration: none;
            color: white;
            text-align: center;
        }

        .home-item img {
            width: 100%;
            height: 420px;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.4s;
            margin-bottom: 10px;
        }

        .home-item:hover img {
            transform: scale(1.05);
        }

        .home-title {
            width: 100%;
            text-align: center;
            color: white;
            padding: 10px 0;
            font-size: 18px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .home-title:hover {
            color: #ccc;
        }

        .button {
            background: #333;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            display: inline-block;
            margin: 5px;
        }

        .footer-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #333;
            margin-top: 60px;
            font-size: 14px;
            opacity: 0.7;
        }

        /* Styles pour les modales */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            overflow-y: auto;
        }

        #galleryModal {
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 0;
        }

        #galleryTitle {
            text-align: center;
            color: white;
            padding: 20px;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.7);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1001;
        }

        .modal-close {
            position: fixed;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            z-index: 1002;
        }

        .modal-content {
            margin-top: 80px;
            padding: 20px;
        }

        /* Galerie organisée par séries */
        .modal-gallery {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .series-container {
            margin-bottom: 40px;
        }

        .series-title {
            text-align: left;
            font-size: 20px;
            color: white;
            font-weight: bold;
            margin-bottom: 15px;
            padding-left: 20px;
        }

        .series-images {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding-bottom: 10px;
        }

        .series-images::-webkit-scrollbar {
            height: 8px;
        }

        .series-images::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .series-images img {
            max-width: 300px;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s;
            flex-shrink: 0;
        }

        .series-images img:hover {
            transform: scale(1.05);
        }
