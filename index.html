<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Artiste - Bruno Collin</title>
    <style>
        /* Styles globaux */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #111;
            color: #fff;
            overflow-x: hidden;
        }

        header {
            padding: 30px;
            text-align: center;
            background: #000;
            border-bottom: 1px solid #333;
        }

        header h1 {
            margin: 0;
            font-size: 36px;
            letter-spacing: 2px;
        }

        section {
            padding: 60px 10%;
        }

        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .home-item {
            cursor: pointer;
            text-decoration: none;
            color: white;
            text-align: center;
        }

        .home-item img {
            width: 100%;
            height: 420px;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.4s;
            margin-bottom: 10px;
        }

        .home-item:hover img {
            transform: scale(1.05);
        }

        .home-title {
            width: 100%;
            text-align: center;
            color: white;
            padding: 10px 0;
            font-size: 18px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .home-title:hover {
            color: #ccc;
        }

        .button {
            background: #333;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            display: inline-block;
            margin: 5px;
        }

        .footer-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #333;
            margin-top: 60px;
            font-size: 14px;
            opacity: 0.7;
        }

        /* Styles pour les modales - CORRIGÉ: initialement cachées */
        #galleryModal, #fullImageModal {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
        }
    </style>
</head>
<body>
    <header>
        <h1>Bruno Collin Plasticien</h1>
    </header>

    <section>
        <h2>Galeries</h2>
        <p>Cliquez sur une image ou sur son titre pour ouvrir la galerie correspondante.</p>
        <div class="home-grid">
            <!-- Galerie Toile -->
            <div class="home-item" onclick="openGallery('toile')">
                <img src="images-toile/toile-serie001-001.jpg">
                <div class="home-title">Peintures sur Toile</div>
            </div>

            <!-- Galerie Papier -->
            <div class="home-item" onclick="openGallery('papier')">
                <img src="images-papier/papier-serie003-003.jpg">
                <div class="home-title">Œuvres sur Papier</div>
            </div>

            <!-- Galerie 3D -->
            <div class="home-item" onclick="openGallery('3d')">
                <img src="images-3d/3d-serie006-001.jpg">
                <div class="home-title">Volumes</div>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-buttons">
            <a href="demarche.html" class="button">Démarche</a>
            <a href="contact.html" class="button">Contact</a>
        </div>
        © 2026 Portfolio Artiste
    </footer>

    <!-- Modales avec styles inline pour double sécurité -->
    <div id="galleryModal" style="display: none; visibility: hidden; opacity: 0;">
        <h2 id="galleryTitle"></h2>
        <span class="modal-close" onclick="closeGallery()">&times;</span>
        <div class="modal-gallery" id="modalGalleryContent"></div>
    </div>

    <div id="fullImageModal" style="display: none; visibility: hidden; opacity: 0;">
        <span class="modal-close" onclick="closeFullImage()">&times;</span>
        <div class="full-image-container">
            <div class="full-image-legend" id="fullImageLegend"></div>
            <img id="fullImageContent">
        </div>
    </div>

    <script>
        // Liste des images pour chaque galerie (organisées par séries)
        const galleries = {
            toile: [
                {
                    series: "Fortuité",
                    images: [
                        { src: "images-toile/toile-serie001-001.jpg", legend: "Fortuité 1\nAcrylique et autres techniques sur toile\n90cm x 130cm\n2025" },
                        { src: "images-toile/toile-serie001-002.jpg", legend: "Fortuité 2\nAcrylique et autres techniques sur toile\n90cm x 130cm\n2025" }
                    ]
                }
                // Autres séries...
            ],
            papier: [
                {
                    series: "Série 'Monotypes'",
                    images: [
                        { src: "images-papier/papier-serie002-001.jpg", legend: "Monotype 1\nAcrylique sur papier\n50cm x 65cm\n2026" }
                    ]
                }
                // Autres séries...
            ],
            "3d": [
                {
                    series: "Echafaudage Vert",
                    images: [
                        { src: "images-3d/3d-serie001-001.jpg", legend: "Echafaudage Vert\nAcrylique et autres techniques sur contreplaqué\n2025" }
                    ]
                }
                // Autres séries...
            ]
        };

        // Ouvre une galerie dans la modale
        function openGallery(type) {
            const modal = document.getElementById("galleryModal");
            const galleryContent = document.getElementById("modalGalleryContent");
            const galleryTitle = document.getElementById("galleryTitle");

            // Définit le titre en fonction du type de galerie
            let title = "";
            if (type === "toile") title = "Peintures sur Toile";
            else if (type === "papier") title = "Œuvres sur Papier";
            else if (type === "3d") title = "Volumes";
            galleryTitle.textContent = title;

            // Vide le contenu précédent
            galleryContent.innerHTML = "";

            // Affiche les séries de la galerie
            galleries[type].forEach(series => {
                const seriesDiv = document.createElement("div");
                seriesDiv.className = "series-container";

                const seriesTitle = document.createElement("div");
                seriesTitle.className = "series-title";
                seriesTitle.textContent = series.series;
                seriesDiv.appendChild(seriesTitle);

                const seriesImagesDiv = document.createElement("div");
                seriesImagesDiv.className = "series-images";

                series.images.forEach(image => {
                    const img = document.createElement("img");
                    img.src = image.src;
                    img.onclick = () => openFullImage(image.src, image.legend);
                    seriesImagesDiv.appendChild(img);
                });

                seriesDiv.appendChild(seriesImagesDiv);
                galleryContent.appendChild(seriesDiv);
            });

            // Affiche la modale
            modal.style.display = "block";
            modal.style.visibility = "visible";
            modal.style.opacity = "1";
            document.body.style.overflow = "hidden";
        }

        // Ferme la modale de galerie
        function closeGallery() {
            const modal = document.getElementById("galleryModal");
            modal.style.display = "none";
            modal.style.visibility = "hidden";
            modal.style.opacity = "0";
            document.body.style.overflow = "auto";
        }

        // Ouvre une image en grand
        function openFullImage(src, legend) {
            const modal = document.getElementById("fullImageModal");
            const img = document.getElementById("fullImageContent");
            const legendElement = document.getElementById("fullImageLegend");

            img.src = src;
            legendElement.innerHTML = legend.replace(/\n/g, '<br>');

            // Affiche la modale
            modal.style.display = "flex";
            modal.style.visibility = "visible";
            modal.style.opacity = "1";
            document.body.style.overflow = "hidden";
        }

        // Ferme l'image agrandie
        function closeFullImage() {
            const modal = document.getElementById("fullImageModal");
            modal.style.display = "none";
            modal.style.visibility = "hidden";
            modal.style.opacity = "0";
            document.body.style.overflow = "auto";
        }

        // Ferme les modales avec Échap
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeGallery();
                closeFullImage();
            }
        });
    </script>
</html>
