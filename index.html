            color: white;
            text-align: center;
        }

<!--        border-radius: 12px; -->

        }

        .home-title {

            color: white;

            font-size: 18px;
            cursor: pointer;
            transition: color 0.3s;

<!--        border-radius: 4px; -->

            flex-shrink: 0;

        .series-images img:hover {

            position: fixed;
            top: 0;
            left: 0;

            height: 100%;

<script>
let currentImages = [];
let currentIndex = 0;

        
// Liste des images pour chaque galerie (organisées par séries)
function showImage(index) {
        
    if (index < 0) index = currentImages.length - 1;
    if (index >= currentImages.length) index = 0;

    currentIndex = index;

    const img = document.getElementById("fullImageContent");
    const legend = document.getElementById("fullImageLegend");

    img.style.opacity = 0;

    setTimeout(() => {
        img.src = currentImages[currentIndex].src;
        legend.textContent = currentImages[currentIndex].legend;
        img.style.opacity = 1;
    }, 150);
}

function nextImage() {
    showImage(currentIndex + 1);
}

function prevImage() {
    showImage(currentIndex - 1);
}

document.addEventListener("keydown", (e) => {
    const modal = document.getElementById("fullImageModal");
    if (modal.style.display !== "flex") return;

    if (e.key === "ArrowRight") nextImage();
    if (e.key === "ArrowLeft") prevImage();
    if (e.key === "Escape") closeFullImage();
});

let touchStartX = 0;
let touchEndX = 0;

const modal = document.getElementById("fullImageModal");

modal.addEventListener("touchstart", (e) => {
    touchStartX = e.changedTouches[0].screenX;
});

modal.addEventListener("touchend", (e) => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
});

function handleSwipe() {
    const diff = touchEndX - touchStartX;

    if (Math.abs(diff) < 50) return;

    if (diff < 0) {
        nextImage(); // swipe gauche → image suivante
    } else {
        prevImage(); // swipe droite → image précédente
    }
}        
        
        // Ouvre une galerie dans la modale
        function openGallery(type) {
            const modal = document.getElementById("galleryModal");
            const galleryContent = document.getElementById("modalGalleryContent");
            const galleryTitle = document.getElementById("galleryTitle");

            // Définit le titre en fonction du type de galerie
            let title = "";
            if (type === "toile") title = "Peintures sur Toile";
            else if (type === "papier") title = "Œuvres sur Papier";
            else if (type === "3d") title = "Volumes";
            galleryTitle.textContent = title;

            // Vide le contenu précédent
            galleryContent.innerHTML = "";

            // Affiche les séries de la galerie
            galleries[type].forEach(series => {
                const seriesDiv = document.createElement("div");
                seriesDiv.className = "series-container";

                const seriesTitle = document.createElement("div");
                seriesTitle.className = "series-title";
                seriesTitle.textContent = series.series;
                seriesDiv.appendChild(seriesTitle);

                const seriesImagesDiv = document.createElement("div");
                seriesImagesDiv.className = "series-images";

                series.images.forEach((image, index) => {
    const img = document.createElement("img");
    img.src = image.src;

    img.onclick = () => {
        currentImages = series.images;
        currentIndex = index;
        openFullImage(image.src, image.legend);
    };

    seriesImagesDiv.appendChild(img);
});
                    
                    
             

                seriesDiv.appendChild(seriesImagesDiv);
                galleryContent.appendChild(seriesDiv);
            });

            modal.style.display = "block";
            modal.scrollTop = 0;
        }

        // Ferme la modale de galerie
        function closeGallery() {
            document.getElementById("galleryModal").style.display = "none";
        }

function openFullImage(src, legend) {
    const modal = document.getElementById("fullImageModal");
    const img = document.getElementById("fullImageContent");
    const legendElement = document.getElementById("fullImageLegend");

    img.src = src;
    legendElement.textContent = legend;

    modal.style.display = "flex";

    setTimeout(() => {
        modal.classList.add("active");
    }, 10);
}
        
 
        // Ferme l'image agrandie
function closeFullImage() {
    const modal = document.getElementById("fullImageModal");

    modal.classList.remove("active");

    setTimeout(() => {
        modal.style.display = "none";
    }, 300);
}
        
    </script>
